<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Stories companion</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the current URL and redirects to index.html
      // See: https://github.com/rafgraph/spa-github-pages
      sessionStorage.redirect = location.href;
      location.replace(
        location.pathname.split("/").slice(0, 2).join("/") + "/"
      );
    </script>
  </head>
  <body></body>
</html>
